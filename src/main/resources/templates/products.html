<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Fakestore Products</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f4f4;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }

        .error {
            background-color: #ffe6e6;
            color: #cc0000;
            border: 1px solid #cc0000;
            padding: 12px;
            margin-bottom: 20px;
            text-align: center;
            border-radius: 8px;
            font-weight: bold;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .card {
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: contain;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .title {
            font-weight: bold;
            font-size: 1rem;
            margin: 10px 0;
            height: 2.5em;
            overflow: hidden;
        }

        .price {
            color: #28a745;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .category {
            font-size: 0.85em;
            color: #555;
            margin-bottom: 5px;
        }

        .date {
            font-size: 0.8em;
            color: #999;
        }

        @media (max-width: 600px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<h1>Fakestore Products</h1>

<!-- Блок отображения ошибки -->
<div th:if="${errorMessage}" class="error" th:text="${errorMessage}"></div>

<div class="grid">
    <div th:each="product : ${products}" class="card">
        <img th:src="${product.image}" alt="Product Image"/>
        <div class="title" th:text="${product.title}"></div>
        <div class="price" th:text="${product.price} + ' $'"></div>
        <div class="category" th:text="${product.category}"></div>
        <div class="date" th:text="${product.date}"></div>
    </div>
</div>

</body>
</html>
